org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=false

android.useAndroidX=true
android.nonTransitiveRClass=true

kotlin.code.style=official

# Trial bypass: when true, the 14-day trial is skipped and full features are
# always available regardless of install date.
#
# Behavior (see app/build.gradle.kts):
#   - Debug builds: bypass=true by default. Only set `trialBypass=false`
#     here when you specifically need to test the trial-expired UI.
#   - Release builds: bypass=false by default. Only set `trialBypass=true`
#     here on a developer device for local release-build testing.
#
# Leave this property unset for normal development (debug bypasses, release
# enforces). Never commit `trialBypass=true` — it must NOT ship to Play.
#trialBypass=false
